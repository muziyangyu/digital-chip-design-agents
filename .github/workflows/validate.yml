name: Validate Plugin

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]
  workflow_call:

jobs:
  validate:
    name: Validate Skills, Agents & Manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate plugin.json
        run: |
          python3 -c "
          import json, os, glob, sys
          repo_root = os.path.realpath(os.getcwd())
          errors = []
          manifests = sorted(glob.glob('plugins/*/.claude-plugin/plugin.json'))
          for manifest in manifests:
              plugin_src = os.path.realpath(os.path.dirname(os.path.dirname(manifest)))
              d = json.load(open(manifest))
              assert 'name' in d, f'{manifest}: missing name'
              assert isinstance(d.get('skills'), list), f'{manifest}: skills must be array'
              assert isinstance(d.get('agents'), list), f'{manifest}: agents must be array'
              for raw in d['skills']:
                  resolved = os.path.realpath(os.path.join(plugin_src, raw))
                  assert resolved.startswith(repo_root + os.sep), f'{manifest}: skill path escapes repo: {raw!r}'
                  assert os.path.exists(resolved), f'{manifest}: skill path not found: {raw!r}'
              for raw in d['agents']:
                  resolved = os.path.realpath(os.path.join(plugin_src, raw))
                  assert resolved.startswith(repo_root + os.sep), f'{manifest}: agent path escapes repo: {raw!r}'
                  assert os.path.exists(resolved), f'{manifest}: agent path not found: {raw!r}'
              print(f'OK: {manifest} — name={d[\"name\"]}, skills={len(d[\"skills\"])}, agents={len(d[\"agents\"])}')
          print(f'All {len(manifests)} plugin.json files validated')
          "

      - name: Validate marketplace.json
        run: |
          python3 -c "
          import json, os, sys
          d = json.load(open('.claude-plugin/marketplace.json'))
          repo_root = os.path.realpath(os.getcwd())
          errors = []
          for p in d.get('plugins', []):
              assert isinstance(p, dict)
              assert isinstance(p.get('name'), str) and p['name'].strip()
              src = p.get('source', '')
              source_dir = os.path.realpath(os.path.join(repo_root, src))
              assert source_dir.startswith(repo_root + os.sep), f'plugin {p[\"name\"]!r} source escapes repo: {src!r}'
              assert os.path.isdir(source_dir), f'plugin {p[\"name\"]!r} source not found: {src!r}'
              assert os.path.isfile(os.path.join(source_dir, '.claude-plugin', 'plugin.json')), f'plugin {p[\"name\"]!r}: no .claude-plugin/plugin.json at source: {src!r}'
              for raw in p.get('skills', []):
                  resolved = os.path.realpath(os.path.join(source_dir, raw))
                  assert resolved.startswith(repo_root + os.sep), f'skill path escapes repo: {raw!r}'
                  assert os.path.isdir(resolved), f'skill path not a dir in {p[\"name\"]!r}: {raw!r}'
              for raw in p.get('agents', []):
                  resolved = os.path.realpath(os.path.join(source_dir, raw))
                  assert resolved.startswith(repo_root + os.sep), f'agent path escapes repo: {raw!r}'
                  assert os.path.isfile(resolved), f'agent path not a file in {p[\"name\"]!r}: {raw!r}'
          n = len(d.get('plugins', []))
          print(f'marketplace.json OK — {n} plugins, all paths verified')
          "

      - name: Validate all SKILL.md files
        run: |
          python3 << 'PYEOF'
          import os, sys, glob
          paths = sorted(glob.glob("plugins/*/skills/*/SKILL.md"))
          required_sections = ["## Purpose", "## Domain Rules", "## QoR Metrics", "## Output Required"]
          errors = []
          for path in paths:
              content = open(path).read()
              if not content.startswith("---"):
                  errors.append(f"{path}: no YAML frontmatter")
              for section in required_sections:
                  if section not in content:
                      errors.append(f"{path}: missing section '{section}'")
              print(f"OK: {path} ({len(content.splitlines())} lines)")
          if errors:
              for e in errors: print(f"ERROR: {e}", file=sys.stderr)
              sys.exit(1)
          print(f"All {len(paths)} skill files validated")
          PYEOF

      - name: Validate all agent .md files
        run: |
          python3 << 'PYEOF'
          import os, sys, glob
          paths = sorted(glob.glob("plugins/*/agents/*.md"))
          required_fields = ["name:", "description:", "model:", "effort:", "maxTurns:"]
          errors = []
          for path in paths:
              content = open(path).read()
              if not content.startswith("---"):
                  errors.append(f"{path}: no YAML frontmatter")
              for field in required_fields:
                  if field not in content:
                      errors.append(f"{path}: missing frontmatter field '{field}'")
              if "## Stage Sequence" not in content:
                  errors.append(f"{path}: missing '## Stage Sequence' section")
              if "## Loop-Back Rules" not in content:
                  errors.append(f"{path}: missing '## Loop-Back Rules' section")
              print(f"OK: {path} ({len(content.splitlines())} lines)")
          if errors:
              for e in errors: print(f"ERROR: {e}", file=sys.stderr)
              sys.exit(1)
          print(f"All {len(paths)} agent files validated")
          PYEOF

      - name: Check skill count matches marketplace registrations
        run: |
          python3 << 'PYEOF'
          import json, glob
          skill_count = len(glob.glob("plugins/*/skills/*/SKILL.md"))
          agent_count = len(glob.glob("plugins/*/agents/*.md"))
          mp = json.load(open(".claude-plugin/marketplace.json"))
          mp_count = len(mp.get("plugins", []))
          print(f"Skills: {skill_count} | Agents: {agent_count} | Marketplace entries: {mp_count}")
          # Agents and marketplace entries must be 1:1 (one orchestrator per plugin).
          # Skills may exceed plugins — a plugin can register more than one skill file
          # (e.g. chip-design-infrastructure registers both 'infrastructure' and 'memory-keeper').
          assert agent_count == mp_count == 15, \
              f"Count mismatch — expected 15 agents and 15 marketplace entries: agents={agent_count}, marketplace={mp_count}"
          assert skill_count >= mp_count, \
              f"Fewer skills than plugins — each plugin must have at least one skill: skills={skill_count}, plugins={mp_count}"
          print("Count check PASSED")
          PYEOF

      - name: Validate fix_request fixture schema
        run: |
          python3 << 'PYEOF'
          import json, sys, os
          REQUIRED_FIELDS = [
              "id", "created_at", "updated_at", "created_by", "failure_class",
              "test_name", "property_or_assertion", "seed", "waveform_path",
              "log_path", "suspected_rtl", "summary", "expected_behavior",
              "observed_behavior", "session_id", "status",
              "rtl_response", "history"
          ]
          REQUIRED_SUSPECTED_RTL = ["module", "signal", "file", "line_range"]
          VALID_FAILURE_CLASSES = {"functional", "protocol", "coverage_gap", "formal_cex"}
          VALID_STATUSES = {"open", "claimed", "fixed", "abandoned"}
          fixture_path = "plugins/meta/skills/pipeline-orchestration/examples/design_state.fix_request.json"
          if not os.path.isfile(fixture_path):
              print(f"ERROR: fixture not found: {fixture_path}", file=sys.stderr)
              sys.exit(1)
          d = json.load(open(fixture_path))
          errors = []
          if d.get("format_version") != "1.1":
              errors.append(f"format_version must be '1.1', got {d.get('format_version')!r}")
          if not isinstance(d.get("fix_requests"), list) or not d["fix_requests"]:
              errors.append("fix_requests must be a non-empty array in the fixture")
          if not isinstance(d.get("pipeline_config"), dict):
              errors.append("pipeline_config must be an object in the fixture")
          elif "max_cross_domain_iterations" not in d["pipeline_config"]:
              errors.append("pipeline_config.max_cross_domain_iterations must be present")
          for i, fr in enumerate(d.get("fix_requests", [])):
              for f in REQUIRED_FIELDS:
                  if f not in fr:
                      errors.append(f"fix_requests[{i}] missing field '{f}'")
              if fr.get("failure_class") not in VALID_FAILURE_CLASSES:
                  errors.append(f"fix_requests[{i}].failure_class {fr.get('failure_class')!r} not in {VALID_FAILURE_CLASSES}")
              if fr.get("status") not in VALID_STATUSES:
                  errors.append(f"fix_requests[{i}].status {fr.get('status')!r} not in {VALID_STATUSES}")
              rtl = fr.get("suspected_rtl", {})
              for f in REQUIRED_SUSPECTED_RTL:
                  if f not in rtl:
                      errors.append(f"fix_requests[{i}].suspected_rtl missing '{f}'")
          if errors:
              for e in errors: print(f"ERROR: {e}", file=sys.stderr)
              sys.exit(1)
          print(f"OK: {fixture_path} — {len(d['fix_requests'])} fix_request(s), format_version={d['format_version']!r}")
          PYEOF

      - name: Validate IDE config files
        run: |
          python3 << 'PYEOF'
          import json, os, sys

          errors = []

          # applyto-map.json must have all 14 domains
          applyto_path = "ides/copilot/applyto-map.json"
          if not os.path.isfile(applyto_path):
              errors.append(f"Missing: {applyto_path}")
          else:
              applyto = json.load(open(applyto_path))
              if len(applyto) != 15:
                  errors.append(f"{applyto_path}: expected 15 domains, got {len(applyto)}")
              else:
                  print(f"OK: {applyto_path} — {len(applyto)} domains")

          # copilot-instructions.md must exist
          cpi_path = "ides/copilot/.github/copilot-instructions.md"
          if not os.path.isfile(cpi_path):
              errors.append(f"Missing: {cpi_path}")
          else:
              print(f"OK: {cpi_path}")

          # gemini-header.md must exist and be non-empty
          gh_path = "ides/gemini/gemini-header.md"
          if not os.path.isfile(gh_path):
              errors.append(f"Missing: {gh_path}")
          elif os.path.getsize(gh_path) == 0:
              errors.append(f"{gh_path}: file is empty")
          else:
              print(f"OK: {gh_path}")

          # opencode-base.json must be valid JSON with model field
          ob_path = "ides/opencode/opencode-base.json"
          if not os.path.isfile(ob_path):
              errors.append(f"Missing: {ob_path}")
          else:
              base = json.load(open(ob_path))
              if "model" not in base:
                  errors.append(f"{ob_path}: missing 'model' field")
              else:
                  print(f"OK: {ob_path} — model={base['model']}")

          # ides/codex/AGENTS.md must exist and be non-empty
          codex_path = "ides/codex/AGENTS.md"
          if not os.path.isfile(codex_path):
              errors.append(f"Missing: {codex_path}")
          elif os.path.getsize(codex_path) == 0:
              errors.append(f"{codex_path}: file is empty")
          else:
              print(f"OK: {codex_path}")

          if errors:
              for e in errors: print(f"ERROR: {e}", file=sys.stderr)
              sys.exit(1)
          print("IDE config files OK")
          PYEOF
